<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#22C55E"/>
  
  <!-- Calendar Base -->
  <rect x="12" y="16" width="28" height="32" rx="3" fill="white"/>
  
  <!-- Calendar Header -->
  <rect x="12" y="16" width="28" height="10" rx="3" fill="#374151"/>
  <rect x="12" y="23" width="28" height="3" fill="#374151"/>
  
  <!-- Calendar Rings -->
  <rect x="18" y="13" width="3" height="6" rx="1.5" fill="#374151"/>
  <rect x="31" y="13" width="3" height="6" rx="1.5" fill="#374151"/>
  
  <!-- Calendar Grid Lines -->
  <line x1="12" y1="34" x2="40" y2="34" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="12" y1="40" x2="40" y2="40" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="21" y1="26" x2="21" y2="48" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="31" y1="26" x2="31" y2="48" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Trash Bin -->
  <g transform="translate(34, 30)">
    <!-- Bin Body -->
    <path d="M4 8L6 24H18L20 8H4Z" fill="#374151"/>
    <!-- Bin Lid -->
    <rect x="2" y="5" width="20" height="3" rx="1" fill="#374151"/>
    <!-- Bin Handle -->
    <rect x="9" y="2" width="6" height="4" rx="1" fill="#374151"/>
    <!-- Bin Lines -->
    <line x1="9" y1="11" x2="9" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="11" x2="12" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="11" x2="15" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
